<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TKD Scoreboard - Liga de Bogotá</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin:0; font-family: 'Arial Black', sans-serif; background:black; color:white; display:flex; height:100vh; overflow:hidden; }
        
        /* --- ESTILOS MARCADOR PRINCIPAL --- */
        .lado { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; position: relative; }
        .azul { background:#0033cc; }
        .rojo { background:#a00000; }
        
        .watermark { position: absolute; bottom: 15px; font-size: 12px; opacity: 0.3; font-weight: bold; pointer-events: none; font-family: sans-serif; }
        .wm-azul { left: 20px; }
        .wm-rojo { right: 20px; }

        .score { font-size: clamp(100px, 18vw, 180px); font-weight: bold; line-height: 1; z-index: 2; }
        .nombre { font-size: 28px; margin-bottom: 5px; font-weight: bold; text-transform: uppercase; }
        .gam { font-size: 18px; background: rgba(0,0,0,0.6); padding: 5px 20px; border-radius: 20px; margin-bottom: 10px; font-family: sans-serif; }
        
        .rounds-ganados { display: flex; gap: 10px; margin-bottom: 20px; }
        .dot { width: 30px; height: 30px; border-radius: 50%; border: 3px solid white; }
        .dot.active { background: yellow; border-color: yellow; box-shadow: 0 0 15px yellow; }

        .centro { width: 320px; background:#111; display:flex; flex-direction:column; align-items:center; justify-content:center; border-left: 2px solid #333; border-right: 2px solid #333; }
        
        /* DISEÑO DE TEXTO LIGA DE BOGOTÁ */
        .titulo-liga { text-align: center; line-height: 1.1; margin-bottom: 15px; }
        .t-liga { font-size: 14px; color: #ddd; letter-spacing: 2px; }
        .t-tkd { font-size: 22px; color: white; display: block; }
        .t-bogota { font-size: 32px; color: #ff4500; display: block; font-weight: 900; }

        .timer { background:yellow; color:black; font-size: 80px; padding: 5px 25px; margin: 10px; font-family: monospace; font-weight: bold; border-radius: 10px; box-shadow: 0 0 20px rgba(255,255,0,0.3); }
        
        #qrcode { background: white; padding: 8px; border-radius: 5px; margin-bottom: 10px; }
        button { cursor:pointer; border:none; border-radius:5px; font-weight: bold; }
        .control { background:#444; color:white; width: 90%; padding:10px; margin:2px; font-size: 12px; }
        .penal { background:#ffaa00; color: black; padding: 10px 20px; margin-bottom: 5px; font-size: 14px; }
        .restar { background: none; color: #666; font-size: 11px; margin-top: 5px; border: 1px solid #333; padding: 2px 8px; border-radius: 10px; }
        input { width: 85%; margin: 2px; padding: 8px; border-radius: 4px; border: none; background: #222; color: white; text-align: center; font-family: sans-serif; }

        /* --- INTERFAZ JUEZ --- */
        #juez-ui { display:none; position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; flex-direction: column; }
        .header-juez { background: #1a1a1a; padding: 15px; text-align: center; border-bottom: 3px solid #ff4500; }
        .juez-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; flex: 1; padding: 8px; }
        .col-juez { display: flex; flex-direction: column; gap: 8px; }
        .btn-tec { flex: 1; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-tec span { font-size: 28px; font-weight: bold; display: block; }
    </style>
</head>
<body>

<!-- VISTA MARCADOR (MESA CENTRAL) -->
<div id="marcador-ui" style="display: flex; width: 100%;">
    <div class="lado azul">
        <div class="watermark wm-azul">LIGA TKD BOGOTÁ</div>
        <div class="rounds-ganados" id="roundsAzul"><div class="dot"></div><div class="dot"></div></div>
        <div class="nombre" id="nAzul">AZUL</div>
        <div class="score" id="azul">0</div>
        <div class="gam">Gam-jeom: <span id="gAzul">0</span></div>
        <button class="penal" onclick="penal('azul')">GAM-JEOM</button>
        <button class="restar" onclick="restar('azul')">-1 PUNTO</button>
    </div>

    <div class="centro">
        <div class="titulo-liga">
            <span class="t-liga">LIGA DE</span>
            <span class="t-tkd">TAEKWONDO</span>
            <span class="t-bogota">BOGOTÁ</span>
        </div>

        <div id="areaText" style="color:yellow; font-size: 16px;">ÁREA 1</div>
        <div style="font-size: 13px; margin-top: 5px;">ROUND <span id="round">1</span></div>
        <div class="timer" id="tiempo">120</div>
        
        <button class="control" style="background: #28a745;" onclick="start()">START</button>
        <button class="control" onclick="pause()">PAUSE</button>
        
        <!-- AJUSTE MANUAL DE TIEMPO -->
        <div style="display:flex; width:90%; gap:5px; margin: 2px 0;">
            <input id="t-manual" type="number" placeholder="Segs" style="flex:1; font-size: 12px; background: #333;">
            <button class="control" style="width:auto; background: #555; padding: 0 15px;" onclick="ajustarTiempo()">SET</button>
        </div>

        <button class="control" onclick="finalizarRound()">FIN ROUND</button>
        <button class="control" style="background:#d9534f;" onclick="resetMatch()">NUEVO COMBATE</button>
        
        <div id="qrcode"></div>
        <input id="aname" placeholder="Competidor Azul">
        <input id="rname" placeholder="Competidor Rojo">
        <button class="control" onclick="setNombres()">ACTUALIZAR</button>
    </div>

    <div class="lado rojo">
        <div class="watermark wm-rojo">LIGA TKD BOGOTÁ</div>
        <div class="rounds-ganados" id="roundsRojo"><div class="dot"></div><div class="dot"></div></div>
        <div class="nombre" id="nRojo">ROJO</div>
        <div class="score" id="rojo">0</div>
        <div class="gam">Gam-jeom: <span id="gRojo">0</span></div>
        <button class="penal" onclick="penal('rojo')">GAM-JEOM</button>
        <button class="restar" onclick="restar('rojo')">-1 PUNTO</button>
    </div>
</div>

<!-- VISTA JUEZ (MÓVIL) -->
<div id="juez-ui">
    <div class="header-juez">
        <div class="t-liga" style="font-size: 10px;">LIGA DE TAEKWONDO</div>
        <div class="t-bogota" style="font-size: 20px;">BOGOTÁ</div>
        <div id="juez-info" style="font-size:12px; color:yellow; margin-top:5px;">CONTROL DE JUEZ - ÁREA 1</div>
    </div>
    <div class="juez-grid">
        <div class="col-juez azul" style="background: #002594; border-radius: 10px;">
            <button class="btn-tec" onclick="enviarPunto('azul', 1)">PUÑO <span>+1</span></button>
            <button class="btn-tec" onclick="enviarPunto('azul', 2)">CUERPO <span>+2</span></button>
            <button class="btn-tec" onclick="enviarPunto('azul', 3)">CABEZA <span>+3</span></button>
            <button class="btn-tec" onclick="enviarPunto('azul', 4)">G. CUERPO <span>+4</span></button>
            <button class="btn-tec" onclick="enviarPunto('azul', 6)">G. CABEZA <span>+5</span></button>
        </div>
        <div class="col-juez rojo" style="background: #800000; border-radius: 10px;">
            <button class="btn-tec" onclick="enviarPunto('rojo', 1)">PUÑO <span>+1</span></button>
            <button class="btn-tec" onclick="enviarPunto('rojo', 2)">CUERPO <span>+2</span></button>
            <button class="btn-tec" onclick="enviarPunto('rojo', 3)">CABEZA <span>+3</span></button>
            <button class="btn-tec" onclick="enviarPunto('rojo', 4)">G. CUERPO <span>+4</span></button>
            <button class="btn-tec" onclick="enviarPunto('rojo', 6)">G. CABEZA <span>+5</span></button>
        </div>
    </div>
</div>

<script>
// --- CONFIGURACIÓN ---
const API_KEY = 'lghMsA.rFblDA:Uo_Ya0lwt-osgx2EhIM1egWJb1pTR4seB8MQKN_Rqp8'; // Reemplazar con Key de Ably[cite: 1]
const params = new URLSearchParams(window.location.search);
const areaID = params.get('area') || '1';
const esJuez = window.innerWidth < 600 || params.get('mode') === 'juez';

const ably = new Ably.Realtime({ key: API_KEY });
const canal = ably.channels.get('tkd-' + areaID);

let rojo=0, azul=0, gRojo=0, gAzul=0, tiempo=120, intervalo=null, round=1, wRojo=0, wAzul=0;
let clics = [];

if (esJuez) {
    document.getElementById('marcador-ui').style.display = 'none';
    document.getElementById('juez-ui').style.display = 'flex';
}

// --- LÓGICA DE PUNTUACIÓN ---
canal.subscribe('p', (msg) => {
    const d = msg.data;
    const item = { e: d.e, pts: d.p, j: msg.connectionId, t: Date.now() };
    clics.push(item);
    clics = clics.filter(c => (Date.now() - c.t) < 2000); // Ventana de 2 segundos[cite: 1]
    
    const coinciden = new Set(clics.filter(c => c.e === item.e && c.pts === item.pts).map(c => c.j));
    if (coinciden.size >= 2) {
        if(item.e === 'rojo') rojo += item.pts; else azul += item.pts;
        clics = clics.filter(c => c.e !== item.e);
        actualizar();
    }
});

function actualizar(){
    document.getElementById("rojo").innerText=rojo; document.getElementById("azul").innerText=azul;
    document.getElementById("gRojo").innerText=gRojo; document.getElementById("gAzul").innerText=gAzul;
    document.getElementById("tiempo").innerText=tiempo; document.getElementById("round").innerText=round;
    
    // REGLA 5 GAM-JEOM[cite: 1]
    if(gRojo >= 5) { alert("ROJO pierde round por 5 Gam-jeoms"); ganarRound('azul'); }
    else if(gAzul >= 5) { alert("AZUL pierde round por 5 Gam-jeoms"); ganarRound('rojo'); }
}

function ganarRound(color){
    pause();
    if(color === 'rojo') wRojo++; else wAzul++;
    actualizarRounds();
    if(wRojo === 2 || wAzul === 2) { 
        alert("GANADOR FINAL: " + color.toUpperCase()); 
        resetMatch(); 
    } else {
        alert("Fin de Round. Prepárense para el siguiente.");
        round++; rojo=0; azul=0; gRojo=0; gAzul=0; tiempo=120; actualizar();
    }
}

// --- CONTROLES MESA ---
function penal(e){ if(e==='rojo'){ gRojo++; azul++; } else { gAzul++; rojo++; } actualizar(); }
function restar(e){ if(e==='rojo'){ if(rojo>0)rojo--; } else { if(azul>0)azul--; } actualizar(); }
function start(){ if(!intervalo) intervalo=setInterval(()=>{ if(tiempo>0){ tiempo--; actualizar(); } else { finalizarRound(); } },1000); }
function pause(){ clearInterval(intervalo); intervalo=null; }

function finalizarRound(){
    if(rojo > azul) ganarRound('rojo');
    else if(azul > rojo) ganarRound('azul');
    else alert("Empate. Se requiere decisión arbitral.");
}

function ajustarTiempo() {
    const val = document.getElementById("t-manual").value;
    if (val !== "") { tiempo = parseInt(val); actualizar(); document.getElementById("t-manual").value = ""; }
}

function resetMatch(){ pause(); round=1; rojo=0; azul=0; gRojo=0; gAzul=0; wRojo=0; wAzul=0; tiempo=120; actualizar(); actualizarRounds(); }

function actualizarRounds(){
    const da = document.getElementById("roundsAzul").children; const dr = document.getElementById("roundsRojo").children;
    for(let i=0; i<2; i++){ da[i].className = i<wAzul?"dot active":"dot"; dr[i].className = i<wRojo?"dot active":"dot"; }
}

function setNombres(){
    document.getElementById("nRojo").innerText=document.getElementById("rname").value||"ROJO";
    document.getElementById("nAzul").innerText=document.getElementById("aname").value||"AZUL";
}

// --- ENVÍO JUEZ ---
function enviarPunto(equipo, puntos) {
    if (navigator.vibrate) navigator.vibrate(50);
    canal.publish('p', { e: equipo, p: puntos });
}

// --- QR CODE ---
const urlBase = window.location.href.split('?')[0];
new QRCode(document.getElementById("qrcode"), { text: urlBase + "?mode=juez&area=" + areaID, width: 90, height: 90 });
actualizar();
</script>
</body>
</html>
