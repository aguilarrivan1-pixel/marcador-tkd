<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taekwondo Arena Control - TKD Bogotá Score Master</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root {
            --bg-dark: #12141c;
            --panel-bg: #1a1d26;
            --panel-border: #2a2f42;
            --accent-blue: #0033cc;
            --accent-rojo: #a00000;
            --text-gray: #a0a5b5;
        }

        body { 
            margin:0; 
            font-family: 'Segoe UI', -apple-system, sans-serif; 
            background: var(--bg-dark); 
            color: white; 
            display: flex; 
            flex-direction: column;
            height: 100vh; 
            overflow: hidden; 
            user-select: none;
        }

        /* BARRA SUPERIOR DE TRANSMISIÓN */
        .top-bar {
            background: #0b0c10;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--panel-border);
            font-size: 13px;
        }
        .stream-status { display: flex; align-items: center; gap: 8px; color: #28a745; font-weight: bold; }
        .stream-dot { width: 10px; height: 10px; background: #28a745; border-radius: 50%; box-shadow: 0 0 8px #28a745; }
        .top-buttons { display: flex; gap: 8px; }
        .btn-top { background: #222633; color: white; border: 1px solid var(--panel-border); padding: 4px 12px; border-radius: 4px; font-size: 11px; cursor: pointer; font-weight: bold;}
        .btn-top:hover { background: #2d3247; }
        .btn-stream { background: #ffaa00; color: #000; border: none; }
        .btn-stream:hover { background: #e09500; }

        /* CONTENEDOR PRINCIPAL INTERFAZ DAEDO */
        .main-container {
            display: flex;
            flex: 1;
            padding: 12px;
            gap: 12px;
            height: calc(100vh - 40px);
            box-sizing: border-box;
        }

        /* LADO IZQUIERDO: MARCADOR DE ARENA */
        .left-arena {
            flex: 1.4;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .scoreboard-frame {
            flex: 1;
            background: #07090e;
            border-radius: 12px;
            border: 1px solid var(--panel-border);
            display: flex;
            position: relative;
            overflow: hidden;
        }

        .side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }
        .side.b-side { background: var(--accent-blue); }
        .side.r-side { background: var(--accent-rojo); }

        .fighter-name-display {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 15px;
            text-transform: uppercase;
            color: white !important;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .score-display {
            font-size: clamp(130px, 16vw, 220px);
            font-family: 'Arial Black', sans-serif;
            font-weight: 900;
            line-height: 0.9;
            text-shadow: 0 4px 10px rgba(0,0,0,0.7);
        }

        /* COLUMNA CENTRAL CON DIFUMINADO HACIA ROJO Y AZUL */
        .center-column {
            width: 240px;
            background: linear-gradient(to right, rgba(0,51,204,0.4) 0%, rgba(0,0,0,1) 20%, rgba(0,0,0,1) 80%, rgba(160,0,0,0.4) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 15px 0;
            position: relative;
            z-index: 2;
        }
        .arena-title { font-size: 12px; color: var(--text-gray); letter-spacing: 2px; font-weight: bold; text-align: center; }
        .round-display { text-align: center; }
        .round-lbl { font-size: 11px; color: var(--text-gray); font-weight: bold; }
        .round-num { font-size: 36px; font-weight: 900; color: #ffaa00; margin-top: -2px; }
        .timer-display { background: #151821; border: 2px solid #ffaa00; color: white; font-size: 54px; padding: 4px 15px; border-radius: 8px; font-family: monospace; font-weight: bold; box-shadow: 0 0 15px rgba(255,170,0,0.2); cursor: pointer; }
        .gamjeom-row { display: flex; justify-content: space-around; width: 100%; font-size: 12px; color: var(--text-gray); font-weight: bold; }
        .gamjeom-counter { font-size: 24px; color: white; font-weight: 900; margin-top: 2px; }

        /* JUEZ DE MESA */
        .mesa-controls {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 12px;
        }
        .mesa-title { font-size: 12px; color: var(--text-gray); margin-bottom: 8px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;}
        .button-group-mesa { display: flex; gap: 6px; margin-bottom: 8px; }
        .btn-m { flex: 1; padding: 10px; border-radius: 6px; font-weight: bold; border: none; font-size: 12px; cursor: pointer; color: white; }
        .btn-m.b { background: #1a44cc; border: 1px solid #3366ff; }
        .btn-m.r { background: #cc1a1a; border: 1px solid #ff3333; }
        .btn-m:hover { filter: brightness(1.2); }
        .gam-mesa-row { display: flex; gap: 8px; }
        .btn-gam-m { flex: 1; background: #2d3247; color: white; border: 1px solid var(--panel-border); padding: 8px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 11px;}

        /* LADO DERECHO */
        .right-panels { width: 380px; display: flex; flex-direction: column; gap: 12px; }
        .panel-box { background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 12px; padding: 14px; }
        .match-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
        .btn-ctrl { padding: 10px; border-radius: 6px; border: none; font-weight: bold; color: white; background: #2a2f42; cursor: pointer; font-size: 12px; text-transform: uppercase;}
        .btn-ctrl:hover { background: #373e56; }
        .btn-ctrl.start { background: #28a745; }
        .btn-ctrl.doctor { background: #d9534f; grid-column: span 2; font-size: 13px; letter-spacing: 1px;}

        .tabs-header { display: flex; border-bottom: 2px solid var(--panel-border); margin-bottom: 12px; font-size: 11px; }
        .tab-btn { background: none; border: none; color: var(--text-gray); padding: 6px 10px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { color: #ffaa00; border-bottom: 2px solid #ffaa00; margin-bottom: -2px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .config-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 12px; color: var(--text-gray); }
        .config-row select, .config-row input { background: #12141c; border: 1px solid var(--panel-border); color: white; padding: 6px; border-radius: 4px; width: 140px; text-align: center; font-weight: bold;}

        .history-list { max-height: 140px; overflow-y: auto; font-size: 11px; font-family: monospace; background: #12141c; padding: 6px; border-radius: 4px; border: 1px solid var(--panel-border); }
        .history-item { padding: 4px; border-bottom: 1px solid #1a1d26; display: flex; justify-content: space-between; }

        /* LOG CONTENEDOR FLOTANTE DE PUNTOS */
        .log-container { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 6px; pointer-events: none; width: 280px; }
        .log-card { background: rgba(20, 24, 36, 0.95); border-radius: 8px; padding: 8px 12px; display: flex; align-items: center; gap: 12px; border-left: 5px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.5); animation: slideIn 0.3s ease forwards; color: white;}
        .log-card.azul { border-left-color: #0033cc; }
        .log-card.rojo { border-left-color: #a00000; }
        .log-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
        .log-info { flex: 1; }
        .log-title { font-size: 12px; font-weight: bold; }
        .log-judges { font-size: 10px; color: var(--text-gray); margin-top: 1px; }
        .log-points { font-size: 18px; font-weight: 900; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .judges-net-grid { display: flex; gap: 8px; margin-top: 10px; }
        .judge-net-box { flex: 1; background: #12141c; padding: 6px; border-radius: 6px; text-align: center; font-size: 10px; border: 1px solid var(--panel-border); }
        .judge-status-dot { width: 8px; height: 8px; background: #444; border-radius: 50%; margin: 5px auto 0; }
        .judge-status-dot.connected { background: #28a745; box-shadow: 0 0 6px #28a745; }
        .qr-area { display: flex; justify-content: space-around; background: white; padding: 8px; border-radius: 6px; margin-top: 10px; }

        /* INTERFAZ MÓVIL CLÁSICA */
        #juez-ui { display:none; position: fixed; top:0; left:0; width:100%; height:100%; background:#12141c; z-index:99999; flex-direction: column; padding: 10px; box-sizing: border-box;}
        .juez-header { background: #000; padding: 8px; text-align: center; font-weight: bold; font-size: 14px; border-radius: 6px; margin-bottom: 10px; color: #ffaa00; border: 1px solid var(--panel-border);}
        .grid-juez { display: grid; grid-template-columns: 1fr 1fr; flex: 1; gap: 10px; }
        .col-juez-side { display: flex; flex-direction: column; gap: 8px; }
        .btn-juez-pts { flex: 1; color: white; border: none; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; transition: transform 0.1s;}
        .btn-juez-pts:active { transform: scale(0.95); }
        .btn-juez-pts.b { background: #0033cc; border: 1px solid #3366ff; }
        .btn-juez-pts.r { background: #a00000; border: 1px solid #ff3333; }
        .btn-juez-pts span { font-size: 28px; font-weight: 900; display: block; margin-top: 2px;}
        .lbl-juez-t { font-size: 11px; opacity: 0.9; text-transform: uppercase; letter-spacing: 1px;}

        #pantalla-ganador { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 999999; flex-direction: column; align-items: center; justify-content: center; text-align: center; background: rgba(0,0,0,0.95); }
        .ganador-box { padding: 40px; border-radius: 25px; border: 4px solid white; box-shadow: 0 0 30px rgba(255,255,255,0.2); }
        .ganador-titulo { font-size: 24px; letter-spacing: 2px; margin-bottom: 10px; color: #ffaa00; font-weight: bold; }
        .ganador-nombre { font-size: 54px; font-weight: 900; text-transform: uppercase; margin-bottom: 30px; }
    </style>
</head>
<body>

<div class="log-container" id="visual-log-container"></div>

<div id="pantalla-ganador">
    <div class="ganador-box" id="ganador-fondo">
        <div class="ganador-titulo">GANADOR DEL COMBATE</div>
        <div class="ganador-nombre" id="ganador-texto">AZUL</div>
        <button class="btn-ctrl" style="background:white; color:black; padding:12px 30px;" onclick="resetMatch()">SIGUIENTE COMBATE</button>
    </div>
</div>

<div id="operator-ui" style="display: flex; flex-direction: column; height: 100%;">
    <div class="top-bar">
        <div class="stream-status"><div class="stream-dot"></div>ÁREA CONTROL NETWORK — ONLINE</div>
        <div style="font-size: 13px; font-weight: bold; color: #ff4500; letter-spacing: 1px;">LIGA DE TAEKWONDO DE BOGOTÁ</div>
        <div class="top-buttons">
            <button class="btn-top btn-stream" onclick="abrirPantallaTV()">📺 EMITIR SEGUNDA PANTALLA (TV)</button>
            <button class="btn-top" onclick="resetMatch()">RESET ARENA</button>
        </div>
    </div>

    <div class="main-container">
        <div class="left-arena">
            <div class="scoreboard-frame">
                <div class="side b-side">
                    <div class="fighter-name-display" id="lbl-name-azul">AZUL</div>
                    <div class="score-display" id="azul">0</div>
                </div>
                
                <div class="center-column">
                    <div class="arena-title" style="color: #ffaa00; font-size:14px;">ÁREA <span id="displayArea">1</span></div>
                    <div class="round-display">
                        <div class="round-lbl">ROUND</div>
                        <div class="round-num" id="round">1</div>
                    </div>
                    <div class="timer-display" id="tiempo" onclick="editarTiempoManual()">2:00</div>
                    <div class="gamjeom-row">
                        <div style="text-align: center;">GAM<div class="gamjeom-counter" id="gAzul">0</div></div>
                        <div style="text-align: center;">GAM<div class="gamjeom-counter" id="gRojo">0</div></div>
                    </div>
                </div>

                <div class="side r-side">
                    <div class="fighter-name-display" id="lbl-name-rojo">ROJO</div>
                    <div class="score-display" id="rojo">0</div>
                </div>
            </div>

            <div class="mesa-controls">
                <div class="mesa-title">Mesa Central Manual Overrides (Área <span id="displayAreaMesa">1</span>)</div>
                <div class="button-group-mesa">
                    <button class="btn-m b" onclick="puntoMesa('azul', 1)">+1 Pño</button>
                    <button class="btn-m b" onclick="puntoMesa('azul', 2)">+2 Peto</button>
                    <button class="btn-m b" onclick="puntoMesa('azul', 3)">+3 Cab</button>
                    <button class="btn-m b" onclick="puntoMesa('azul', 4)">+4 G-Peto</button>
                    <button class="btn-m b" onclick="puntoMesa('azul', 6)">+6 G-Cab</button>
                    <button class="btn-m r" onclick="puntoMesa('rojo', 1)">+1 Pño</button>
                    <button class="btn-m r" onclick="puntoMesa('rojo', 2)">+2 Peto</button>
                    <button class="btn-m r" onclick="puntoMesa('rojo', 3)">+3 Cab</button>
                    <button class="btn-m r" onclick="puntoMesa('rojo', 4)">+4 G-Peto</button>
                    <button class="btn-m r" onclick="puntoMesa('rojo', 6)">+6 G-Cab</button>
                </div>
                <div class="gam-mesa-row">
                    <button class="btn-gam-m" onclick="penal('azul')">+1 Gam Azul</button>
                    <button class="btn-gam-m" onclick="restar('azul')">-1 Pts Azul</button>
                    <button class="btn-gam-m" onclick="penal('rojo')">+1 Gam Rojo</button>
                    <button class="btn-gam-m" onclick="restar('rojo')">-1 Pts Rojo</button>
                </div>
            </div>
        </div>

        <div class="right-panels">
            <div class="panel-box">
                <div class="mesa-title">Match Control</div>
                <div class="match-grid">
                    <button class="btn-ctrl start" id="btn-play" onclick="start()">START ROUND</button>
                    <button class="btn-ctrl" onclick="pause()">TIMEOUT / PAUSE</button>
                    <button class="btn-ctrl" onclick="finalizarRound()">FINISH ROUND</button>
                    <button class="btn-ctrl" style="background: #444;" onclick="resetMatch()">RESET MATCH</button>
                    <button class="btn-ctrl doctor" onclick="activarDoctor()">🏥 DOCTOR (1:00 MIN Kye-shi)</button>
                </div>
            </div>

            <div class="panel-box" style="flex: 1; display: flex; flex-direction: column;">
                <div class="tabs-header">
                    <button class="tab-btn active" id="tab-btn-rules" onclick="switchTab('rules')">ARENA RULES</button>
                    <button class="tab-btn" id="tab-btn-history" onclick="switchTab('history')">MATCH HISTORY LOGS</button>
                </div>

                <div id="tab-rules" class="tab-content active">
                    <div class="config-row">
                        <label>Competidores:</label>
                        <div style="display: flex; flex-direction: column; gap:4px;">
                            <input id="aname" placeholder="Nombre Azul" oninput="setNombres()" style="width:130px; font-size:11px;">
                            <input id="rname" placeholder="Nombre Rojo" oninput="setNombres()" style="width:130px; font-size:11px;">
                        </div>
                    </div>
                    <div class="config-row">
                        <label>Configuración Jueces:</label>
                        <select id="judge-select" onchange="cambiarModoJueces()">
                            <option value="1">1 Juez Aprendiz (Directo)</option>
                            <option value="2" selected>2 Jueces (Coincidencia Req)</option>
                            <option value="3">3 Jueces (Mín. 2 Coinciden)</option>
                        </select>
                    </div>
                    <div class="config-row">
                        <label>Duración del Round:</label>
                        <select id="time-select" onchange="cambiarConfigTiempo()">
                            <option value="120" selected>2:00 Minutos</option>
                            <option value="90">1:30 Minutos</option>
                            <option value="60">1:00 Minuto</option>
                        </select>
                    </div>
                    <div class="config-row">
                        <label>Límite Gam-jeom:</label>
                        <input type="number" id="gamjeom-limit" value="5" style="width:50px;">
                    </div>
                </div>

                <div id="tab-history" class="tab-content" style="flex: 1;">
                    <div class="history-list" id="match-history-list">
                        <div class="history-item" style="color: gray;">Esperando acciones de combate...</div>
                    </div>
                </div>

                <div class="mesa-title" style="margin-top:15px;">Conexión Red Arbitral</div>
                <div class="judges-net-grid">
                    <div class="judge-net-box">JUEZ 1<div class="judge-status-dot connected"></div></div>
                    <div class="judge-net-box">JUEZ 2<div class="judge-status-dot connected"></div></div>
                    <div class="judge-net-box">JUEZ 3<div class="judge-status-dot"></div></div>
                </div>

                <div class="qr-area" id="qrcode"></div>
            </div>
        </div>
    </div>
</div>

<div id="juez-ui">
    <div class="juez-header">VINCULADO DIRECTO A: ÁREA <span id="displayAreaJuez">1</span></div>
    <div class="grid-juez">
        <div class="col-juez-side">
            <button class="btn-juez-pts b" onclick="enviarPunto('azul', 1)"><div class="lbl-juez-t">Puño</div><span>+1</span></button>
            <button class="btn-juez-pts b" onclick="enviarPunto('azul', 2)"><div class="lbl-juez-t">Peto</div><span>+2</span></button>
            <button class="btn-juez-pts b" onclick="enviarPunto('azul', 3)"><div class="lbl-juez-t">Casco</div><span>+3</span></button>
            <button class="btn-juez-pts b" onclick="enviarPunto('azul', 4)"><div class="lbl-juez-t">Giro Peto</div><span>+4</span></button>
            <button class="btn-juez-pts b" onclick="enviarPunto('azul', 6)"><div class="lbl-juez-t">Giro Casco</div><span>+6</span></button>
        </div>
        <div class="col-juez-side">
            <button class="btn-juez-pts r" onclick="enviarPunto('rojo', 1)"><div class="lbl-juez-t">Puño</div><span>+1</span></button>
            <button class="btn-juez-pts r" onclick="enviarPunto('rojo', 2)"><div class="lbl-juez-t">Peto</div><span>+2</span></button>
            <button class="btn-juez-pts r" onclick="enviarPunto('rojo', 3)"><div class="lbl-juez-t">Casco</div><span>+3</span></button>
            <button class="btn-juez-pts r" onclick="enviarPunto('rojo', 4)"><div class="lbl-juez-t">Giro Peto</div><span>+4</span></button>
            <button class="btn-juez-pts r" onclick="enviarPunto('rojo', 6)"><div class="lbl-juez-t">Giro Casco</div><span>+6</span></button>
        </div>
    </div>
</div>

<script>
const API_KEY = 'lghMsA.rFblDA:Uo_Ya0lwt-osgx2EhIM1egWJb1pTR4seB8MQKN_Rqp8'; 

const params = new URLSearchParams(window.location.search);
const areaID = params.get('area') || '1'; 
const esJuez = window.innerWidth < 768 || params.get('mode') === 'juez';

document.getElementById("displayArea").innerText = areaID;
document.getElementById("displayAreaMesa").innerText = areaID;
document.getElementById("displayAreaJuez").innerText = areaID;

if(esJuez) {
    document.getElementById("operator-ui").style.display = "none";
    document.getElementById("juez-ui").style.display = "flex";
}

const ably = new Ably.Realtime({ key: API_KEY });
const canal = ably.channels.get('tkd-area-' + areaID); 

let rojo=0, azul=0, gRojo=0, gAzul=0, tiempo=120, intervalo=null, round=1, wRojo=0, wAzul=0, clics=[];
let modoJueces = 2; 
let ventanaTV = null; 
let enModoDoctor = false;

const ICONOS_SVG = {
    1: `<svg viewBox="0 0 24 24" width="28" height="28" fill="white"><path d="M4 8h4V5H4v3zm5 0h4V3H9v5zm5 0h6c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2h-6v6zm-5 5h4v-4H9v4zm-5 0h4v-3H4v3zm10 9h6c1.1 0 2-.9 2-2v-5h-8v7z"/></svg>`, 
    2: `<svg viewBox="0 0 24 24" width="28" height="28" fill="white"><path d="M12 2c-4.97 0-9 4.03-9 9 0 2.12.74 4.07 1.97 5.61L4.35 19.4c-.39.39-.39 1.02 0 1.41.39.39 1.02.39 1.41 0l2.79-2.79C10.09 18.66 11.03 19 12 19s1.91-.34 2.45-.98l2.79 2.79c.39.39 1.02.39 1.41 0 .39-.39.39-1.02 0-1.41l-2.62-2.78C17.26 15.07 18 13.12 18 11c0-4.97-4.03-9-9-9zm0 15c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6z"/></svg>`, 
    3: `<svg viewBox="0 0 24 24" width="28" height="28" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>`, 
    4: `<svg viewBox="0 0 24 24" width="28" height="28" fill="white"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>`,

};

canal.subscribe('p', (msg) => {
    const d = msg.data;
    const jId = msg.connectionId ? msg.connectionId.substring(0, 3) : "Jz"; 

    if (modoJueces === 1) {
        efectuarPunto(d.e, d.p, `Juez Formación (${jId})`);
    } else {
        clics.push({ e: d.e, pts: d.p, j: jId, t: Date.now() });
        clics = clics.filter(c => (Date.now() - c.t) < 2000); 

        const coinciden = clics.filter(c => c.e === d.e && c.pts === d.p);
        const juecesUnicos = new Set(coinciden.map(c => c.j));

        if (juecesUnicos.size >= modoJueces) {
            const listadoJueces = Array.from(juecesUnicos).join(' y ');
            efectuarPunto(d.e, d.p, `Jueces ${listadoJueces}`);
            clics = clics.filter(c => c.e !== d.e);
        }
    }
});

function efectuarPunto(equipo, puntos, juecesTxt) {
    if(equipo === 'rojo') rojo += puntos; else azul += puntos;
    dispararLogVisual(equipo, puntos, juecesTxt);
    registrarEnHistorial(equipo, puntos, juecesTxt);
    actualizar();
}

// NUEVO DISPARADOR DE LOG: INYECTA LA ANIMACIÓN EN MESA Y TV EN SIMULTÁNEO
function dispararLogVisual(equipo, puntos, juecesTxt) {
    let nombreTecnica = "Ataque";
    if(puntos === 1) nombreTecnica = "Marcaje de Puño";
    if(puntos === 2) nombreTecnica = "Ataque al Peto";
    if(puntos === 3) nombreTecnica = "Patada a la Cabeza";
    if(puntos === 4) nombreTecnica = "Giro Técnico Peto";
    if(puntos === 6) nombreTecnica = "Giro Técnico Cabeza";

    const estructuraCardHTML = `
        <div class="log-icon">${ICONOS_SVG[puntos] || ''}</div>
        <div class="log-info">
            <div class="log-title">${nombreTecnica}</div>
            <div class="log-judges">${juecesTxt}</div>
        </div>
        <div class="log-points">+${puntos}</div>
    `;

    // Renderizar en Panel Operador
    inyectarCardLog(document.getElementById("visual-log-container"), equipo, estructuraCardHTML);

    // Renderizar de forma remota en el TV si está activo
    if (ventanaTV && !ventanaTV.closed) {
        inyectarCardLog(ventanaTV.document.getElementById("tv-visual-log-container"), equipo, estructuraCardHTML);
    }
}

function inyectarCardLog(contenedorObjetivo, equipo, contenidoHTML) {
    if(!contenedorObjetivo) return;
    const card = document.createElement("div");
    card.className = `log-card ${equipo}`;
    card.style.cssText = `
        background: rgba(20, 24, 36, 0.95); border-radius: 8px; padding: 8px 12px;
        display: flex; align-items: center; gap: 12px; border-left: 5px solid ${equipo==='azul'?'#0033cc':'#a00000'};
        box-shadow: 0 4px 15px rgba(0,0,0,0.5); animation: slideIn 0.3s ease forwards; color: white; margin-bottom: 5px;
    `;
    card.innerHTML = contenidoHTML;
    contenedorObjetivo.appendChild(card);
    setTimeout(() => { card.remove(); }, 3000);
}

function registrarEnHistorial(equipo, puntos, procedencia) {
    const lista = document.getElementById("match-history-list");
    if(lista.innerHTML.includes("Esperando acciones")) lista.innerHTML = "";
    
    const item = document.createElement("div");
    item.className = "history-item";
    
    let min = Math.floor(tiempo / 60);
    let seg = tiempo % 60;
    let marcaTiempo = `${min}:${seg < 10 ? '0' : ''}${seg}`;

    item.innerHTML = `
        <span style="color: ${equipo==='azul'?'#4d7cff':'#ff4d4d'}">[R${round} - ${marcaTiempo}] +${puntos} ${equipo.toUpperCase()}</span>
        <span style="color: gray;">${procedencia}</span>
    `;
    lista.insertBefore(item, lista.firstChild);
}

function puntoMesa(equipo, puntos) { efectuarPunto(equipo, puntos, 'Mesa de Control'); }

function switchTab(tabName) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    if(tabName === 'rules') {
        document.getElementById('tab-btn-rules').classList.add('active');
        document.getElementById('tab-rules').classList.add('active');
    } else {
        document.getElementById('tab-btn-history').classList.add('active');
        document.getElementById('tab-history').classList.add('active');
    }
}

function editarTiempoManual() {
    pause();
    let entrada = prompt("Modificar tiempo del combate (Ejemplo: 2:00, 1:30):", document.getElementById("tiempo").innerText.replace("MED ", ""));
    if(entrada && entrada.includes(":")) {
        let partes = entrada.split(":");
        let m = parseInt(partes[0]) || 0;
        let s = parseInt(partes[1]) || 0;
        tiempo = (m * 60) + s;
        enModoDoctor = false;
        actualizar();
    }
}

function activarDoctor() {
    pause();
    enModoDoctor = true;
    tiempo = 60; 
    alert("¡Kye-shi! Tiempo Médico activado (Área " + areaID + ")");
    start();
}

function actualizar(){
    document.getElementById("rojo").innerText=rojo; 
    document.getElementById("azul").innerText=azul;
    document.getElementById("gRojo").innerText=gRojo; 
    document.getElementById("gAzul").innerText=gAzul;
    
    let mins = Math.floor(tiempo / 60);
    let segs = tiempo % 60;
    let stringTiempo = `${mins}:${segs < 10 ? '0' : ''}${segs}`;
    
    if (enModoDoctor) {
        document.getElementById("tiempo").innerText = "MED " + stringTiempo;
        document.getElementById("tiempo").style.borderColor = "#d9534f";
    } else {
        document.getElementById("tiempo").innerText = stringTiempo;
        document.getElementById("tiempo").style.borderColor = "#ffaa00";
    }
    
    document.getElementById("round").innerText = round;

    if(ventanaTV && !ventanaTV.closed) {
        ventanaTV.document.getElementById("tv-azul").innerText = azul;
        ventanaTV.document.getElementById("tv-rojo").innerText = rojo;
        ventanaTV.document.getElementById("tv-gAzul").innerText = gAzul;
        ventanaTV.document.getElementById("tv-gRojo").innerText = gRojo;
        ventanaTV.document.getElementById("tv-tiempo").innerText = document.getElementById("tiempo").innerText;
        ventanaTV.document.getElementById("tv-tiempo").style.borderColor = document.getElementById("tiempo").style.borderColor;
        ventanaTV.document.getElementById("tv-round").innerText = round;
        ventanaTV.document.getElementById("tv-name-azul").innerText = document.getElementById("lbl-name-azul").innerText;
        ventanaTV.document.getElementById("tv-name-rojo").innerText = document.getElementById("lbl-name-rojo").innerText;
    }

    const limiteGam = parseInt(document.getElementById("gamjeom-limit").value) || 5;
    if(gRojo >= limiteGam) ganarRound('azul'); else if(gAzul >= limiteGam) ganarRound('rojo');
}

function ganarRound(color){
    pause();
    if(color === 'rojo') wRojo++; else wAzul++;
    if(wRojo === 2 || wAzul === 2) { 
        mostrarPantallaGanador(color); 
    } else { 
        alert("Fin del Round " + round + "\nGanador del Round: " + color.toUpperCase()); 
        round++; rojo=0; azul=0; gRojo=0; gAzul=0; 
        cambiarConfigTiempo(); 
    }
}

function mostrarPantallaGanador(color) {
    const textoGanador = document.getElementById("ganador-texto");
    const fondoGanador = document.getElementById("ganador-fondo");
    if(color === 'azul') {
        textoGanador.innerText = document.getElementById("lbl-name-azul").innerText;
        fondoGanador.style.backgroundColor = "#0033cc";
    } else {
        textoGanador.innerText = document.getElementById("lbl-name-rojo").innerText;
        fondoGanador.style.backgroundColor = "#a00000";
    }
    document.getElementById("pantalla-ganador").style.display = "flex";
}

function start(){ 
    if(!intervalo) {
        intervalo = setInterval(() => { 
            if(tiempo > 0){ tiempo--; actualizar(); } else { 
                if(enModoDoctor) {
                    pause(); enModoDoctor = false;
                    alert("Tiempo médico finalizado. Reanude el combate.");
                    cambiarConfigTiempo();
                } else { finalizarRound(); }
            } 
        }, 1000);
        document.getElementById("btn-play").innerText = "PAUSE ROUND";
        document.getElementById("btn-play").style.backgroundColor = "#ffaa00";
    } else { pause(); }
}

function pause(){ 
    clearInterval(intervalo); 
    intervalo = null; 
    document.getElementById("btn-play").innerText = "START ROUND";
    document.getElementById("btn-play").style.backgroundColor = "#28a745";
}

function finalizarRound(){ 
    if(rojo > azul) { ganarRound('rojo'); } 
    else if(azul > rojo) { ganarRound('azul'); } 
    else { 
        pause();
        alert("¡Empate! Iniciando Round de Oro (1 minuto)"); 
        tiempo = 60; actualizar(); 
    } 
}

function penal(e){ 
    if(e==='rojo'){ gRojo++; azul++; registrarEnHistorial('azul', 1, 'Gam-jeom Rojo'); } 
    else { gAzul++; rojo++; registrarEnHistorial('rojo', 1, 'Gam-jeom Azul'); } 
    actualizar(); 
}

function restar(e){ 
    if(e==='rojo'){ if(rojo>0)rojo--; registrarEnHistorial('rojo', -1, 'Corrección Mesa'); } 
    else { if(azul>0)azul--; registrarEnHistorial('azul', -1, 'Corrección Mesa'); } 
    actualizar(); 
}

function setNombres(){
    document.getElementById("lbl-name-azul").innerText = document.getElementById("aname").value.toUpperCase() || "AZUL";
    document.getElementById("lbl-name-rojo").innerText = document.getElementById("rname").value.toUpperCase() || "ROJO";
    actualizar();
}

function cambiarModoJueces() { modoJueces = parseInt(document.getElementById("judge-select").value); }
function cambiarConfigTiempo() { tiempo = parseInt(document.getElementById("time-select").value); enModoDoctor = false; actualizar(); }
function resetMatch(){ location.reload(); }
function enviarPunto(equipo, puntos) { if (navigator.vibrate) navigator.vibrate(50); canal.publish('p', { e: equipo, p: puntos }); }
